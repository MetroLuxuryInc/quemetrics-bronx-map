<!DOCTYPE html>
<html>
<head>
  <title>Manhattan Service Area</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // True tight Manhattan bounds
  const manhattanBounds = L.latLngBounds(
    [40.7003, -74.0180], // Southwest (Battery Park)
    [40.8780, -73.9070]  // Northeast (Inwood)
  );

  // Create map locked to Manhattan
  const map = L.map("map", {
    zoomControl: true,
    dragging: true,
    scrollWheelZoom: true,
    doubleClickZoom: true,
    boxZoom: false,
    keyboard: false,
    maxBounds: manhattanBounds,
    maxBoundsViscosity: 1.0,
    minZoom: 12,
    maxZoom: 17
  });

  // Add free OpenStreetMap tiles (north always up)
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
    noWrap: true
  }).addTo(map);

  // Fit exactly to Manhattan
  map.fitBounds(manhattanBounds);

  // Optional: subtle Manhattan highlight
  L.rectangle(manhattanBounds, {
    color: "#0057ff",
    weight: 2,
    fillOpacity: 0.08
  }).addTo(map);

</script>

</body>
</html>
