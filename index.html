<!DOCTYPE html>
<html>
<head>
  <title>Manhattan Service Area</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Manhattan geographic bounds
  const manhattanBounds = [
    [40.7003, -74.0200], // Southwest (Battery Park)
    [40.8790, -73.9070]  // Northeast (Inwood)
  ];

  // Create map
  const map = L.map("map", {
    maxBounds: manhattanBounds,
    maxBoundsViscosity: 1.0
  }).setView([40.7831, -73.9712], 12);

  // Add free OpenStreetMap tiles
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
    noWrap: true
  }).addTo(map);

  // Draw Manhattan area shading
  const polygon = L.polygon([
    [40.7003, -74.0200],
    [40.7003, -73.9070],
    [40.8790, -73.9070],
    [40.8790, -74.0200]
  ], {
    color: "#0057ff",
    fillOpacity: 0.15,
    weight: 2
  }).addTo(map);

  // Fit map exactly to Manhattan
  map.fitBounds(manhattanBounds);
</script>

</body>
</html>
