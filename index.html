<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bronx Traffic Map</title>
  <style>
    /* Make html and body take full viewport and remove margin */
    html, body {
      height: 100vh;        /* full viewport height */
      width: 100vw;         /* full viewport width */
      margin: 0;
      padding: 0;
      overflow: hidden;     /* prevent scrollbars */
    }

    /* iframe fills the entire viewport */
    #trafficMap {
      position: fixed;      /* stick to viewport */
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>

  <!-- 511NY Embedded Map -->
  <iframe
    id="trafficMap"
    src="https://511ny.org/Map/EmbeddedMap?region=NYC&layers=trafficSpeeds,incidents&center=40.8448,-73.8648&zoom=13"
    allowfullscreen
    loading="lazy">
  </iframe>

</body>
</html>
