<!DOCTYPE html>
<html>
<head>
  <title>Manhattan Service Area</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  function initMap() {
    const manhattan = { lat: 40.7831, lng: -73.9712 };

    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 12,
      center: manhattan,
      restriction: {
        latLngBounds: {
          north: 40.882,
          south: 40.698,
          west: -74.047,
          east: -73.907
        },
        strictBounds: false,
      },
    });

    new google.maps.Marker({
      position: manhattan,
      map: map,
      title: "Manhattan Service Area",
    });
  }
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap">
</script>

</body>
</html>
