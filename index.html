<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bronx Traffic Map</title>
  <style>
    /* Make body and html take full height, remove margin */
    html, body {
      height: 100%;
      margin: 0;
    }

    /* Make iframe take full viewport */
    #trafficMap {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- 511NY Embedded Map -->
  <iframe
    id="trafficMap"
    src="https://511ny.org/Map/EmbeddedMap?region=NYC&layers=trafficSpeeds,cameras,incidents&center=40.8448,-73.8648&zoom=13"
    allowfullscreen
    loading="lazy">
  </iframe>

</body>
</html>
